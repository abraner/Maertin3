<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script>
$(document).ready(function() {

    if ($('#id_descript8').val() === 'Select Material') {
       $("#id_descript8").css('background-color', '#2e8b57')
       $("#id_descript8").attr("disabled", true)
       $("#id_quanity8").attr("disabled", true)
       $(".delete8").attr("disabled", true)
    } else {
        $("#id_descript8").css('background-color', 'gold')
        $(".delete8").attr("disabled", false)
   }

});

$(function(){
   $('#id_descript8').change(function(){
        setTimeout(function(){
                var selectBox =document.getElementById('id_descript8');
                var userInput =selectBox.options[selectBox.selectedIndex].value;
                console.log(userInput);
                var url = $(".form2").attr("descript8-url");
                    $.ajax({
                        type:'POST',
                       url: url,
                       data:{
                            id_descript8: $('#id_descript8').val(),
                            csrfmiddlewaretoken: '{{ csrf_token }}'
                         },
                    });
        }, 100);
    });
});
