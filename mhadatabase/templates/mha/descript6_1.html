<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script>
$(document).ready(function() {

    if ($('#id_descript6').val() === '') {
       $("#id_descript6").css('background-color', '#2e8b57')
       $(".form2 #id_quanity6").attr("disabled", true)
    } else {
        $("#id_descript6").css('background-color', 'gold')
        $(".form2 #id_quanity6").attr("disabled", false)
    }

    if ($('.form2 #id_jobtype6').val() === 'Select Equip. Type') {
        $("#id_descript6").attr("disabled", true)
    } else {
        $("#id_descript6").attr("disabled", false)
    }

});

   $('#id_descript6').change(function(){
        setTimeout(function(){
                var selectBox =document.getElementById('id_descript6');
                var userInput =selectBox.options[selectBox.selectedIndex].value;
                console.log(userInput);
                var url = $(".form2").attr("descript6-url");
                    $.ajax({
                        type:'POST',
                       url: url,
                       data:{
                            id_descript6: $('#id_descript6').val(),
                            csrfmiddlewaretoken: '{{ csrf_token }}'
                         },
                    });
        }, 100);
    });
});
