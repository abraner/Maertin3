{{ form.descript2 }}

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script>
$(document).ready(function() {

    if ($('#id_descript2').val() === '') {
       $("#id_descript2").css('background-color', '#2e8b57')
       $(".form2 #id_quanity2").attr("disabled", true)
    } else {
        $("#id_descript2").css('background-color', 'gold')
        $(".form2 #id_quanity2").attr("disabled", false)
    }

    if ($('.form2 #id_jobtype2').val() === 'Select Equip. Type') {
        $("#id_descript2").attr("disabled", true)
    } else {
        $("#id_descript2").attr("disabled", false)
    }

});

$(function(){
   $('#id_descript2').change(function(){
        setTimeout(function(){
                var selectBox =document.getElementById('id_descript2');
                var userInput =selectBox.options[selectBox.selectedIndex].value;
                console.log(userInput);
                var url = $(".form2").attr("descript2-url");
                    $.ajax({
                        type:'POST',
                       url: url,
                       data:{
                            id_descript2: $('#id_descript2').val(),
                            csrfmiddlewaretoken: '{{ csrf_token }}'
                         },
                    });
        }, 100);
    });
});

$(function(){
    $('#id_descript2').change(function(){
        setTimeout(function(){
            var urlC = $(".form2").attr("descript2load-url");
            req = $.ajax({
                   url: urlC,
                   data:{
                     },
                     success: function (data) {
                       $("#descript2_id").html(data);
                     }
                });
        },400);
    });
});

    $('#id_descript2').change(function(){

</script>
