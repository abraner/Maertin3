<script>
$(document).ready(function() {

  if ($('#id_descript18').val() === 'Select Material' || $('#id_descript18').val() === '' &&  $('#descript18b_id').val() == 1 ){
       $("#id_descript18").css('background-color', '#1E5938')
        $("#id_descript18").attr("disabled", true)
     } else if  ($('#id_descript18').val() === 'Select Material' || $('#id_descript18').val() === '' &&  $('#descript18b_id').val() > 1 ){
        $("#id_descript18").attr("disabled", false)
        $("#id_descript18").css('background-color', '#90B5A1')
     } else   {
        $("#id_descript18").css('background-color', 'gold')
     }

});

$(function(){
   $('#id_descript18').change(function(){
        setTimeout(function(){
                var selectBox =document.getElementById('id_descript18');
                var userInput =selectBox.options[selectBox.selectedIndex].value;
                console.log(userInput);
                var url = $(".form2").attr("descript18-url");
                    $.ajax({
                        type:'POST',
                       url: url,
                       data:{
                            id_descript18: $('#id_descript18').val(),
                            csrfmiddlewaretoken: '{{ csrf_token }}'
                         },
                    });
        }, 100);
    });
});
