<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script>
$(document).ready(function() {

    if ($('#id_descript17').val() === 'Select Material') {
       $("#id_descript17").css('background-color', '#2e8b57')
       $("#id_quanity17").attr("disabled", true)
    } else {
        $("#id_descript17").css('background-color', 'gold')
      //  $("#id_descript17").attr("disabled", true)
   }

});

    $(function(){
   $('#id_quanity17').change(function(){
        setTimeout(function(){
                var selectBox =document.getElementById('id_quanity17');
                var userInput =selectBox.options[selectBox.selectedIndex].value;
                console.log(userInput);
                var url = $(".form2").attr("quant17-url");
                    $.ajax({
                        type:'POST',
                       url: url,
                       data:{
                            id_quanity17: $('#id_quanity17').val(),
                            csrfmiddlewaretoken: '{{ csrf_token }}'
                         },
                    });
        }, 100);
    });
});
</script>
