<script>
$(document).ready(function() {

  if ($('#id_descript15').val() === 'Select Material' || $('#id_descript15').val() === '' &&  $('#descript15b_id').val() == 1 ){
       $("#id_descript15").css('background-color', '#1E5938')
        $("#id_descript15").attr("disabled", true)
     } else if  ($('#id_descript15').val() === 'Select Material' || $('#id_descript15').val() === '' &&  $('#descript15b_id').val() > 1 ){
        $("#id_descript15").attr("disabled", false)
        $("#id_descript15").css('background-color', '#90B5A1')
     } else   {
        $("#id_descript15").css('background-color', 'gold')
     }

});

$(function(){
   $('#id_descript15').change(function(){
        setTimeout(function(){
                var selectBox =document.getElementById('id_descript15');
                var userInput =selectBox.options[selectBox.selectedIndex].value;
                console.log(userInput);
                var url = $(".form2").attr("descript15-url");
                    $.ajax({
                        type:'POST',
                       url: url,
                       data:{
                            id_descript15: $('#id_descript15').val(),
                            csrfmiddlewaretoken: '{{ csrf_token }}'
                         },
                    });
        }, 100);
    });
});
