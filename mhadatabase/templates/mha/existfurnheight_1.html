
<div class="input">
<label class="label_furnheight">Furnace Height :</label>
    <input id="existfurnheight_id" type="text" value="{{ existfurnheight }}" onfocusout="myFunctionExistFurnHeight()">

</div>
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script>
 $(document).ready(function() {
    $("#existfurnheight_id").attr("disabled", true)
   const inputFields = document.querySelectorAll('input[type="text"], input[type="email"], input[type="number"]');

   inputFields.forEach(input => {
     const defaultValue = input.value;
     input.addEventListener('focus', function() {
       if (this.value === defaultValue) {
         this.value = '';
       }
     });
     input.addEventListener('blur', function() {
        if (this.value === '') {
         this.value = defaultValue;
        }
     });
   });
});


function myFunctionExistFurnHeight() {

$("#existfurnheight_id").css('background-color', '#ffd700')

$('#id_existfurnheightwidth').focus();

var userInput = document.getElementById("existfurnheight_id").value;
                    console.log(userInput);
                    var url = $(".form2").attr("existfurnheight-url");
                     $.ajax({
                        type:'POST',
                       url: url,
                       data:{
                            existfurnheight_id: $("#existfurnheight_id").val(),
                            csrfmiddlewaretoken: '{{ csrf_token }}'
                         },
                    });
}


</script>
