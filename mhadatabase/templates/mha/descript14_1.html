<script>
$(document).ready(function() {

  if ($('#id_descript14').val() === 'Select Material' || $('#id_descript14').val() === '' &&  $('#descript14b_id').val() == 1 ){
       $("#id_descript14").css('background-color', '#1E5938')
        $("#id_descript14").attr("disabled", true)
     } else if  ($('#id_descript14').val() === 'Select Material' || $('#id_descript14').val() === '' &&  $('#descript14b_id').val() > 1 ){
        $("#id_descript14").attr("disabled", false)
        $("#id_descript14").css('background-color', '#90B5A1')
     } else   {
        $("#id_descript14").css('background-color', 'gold')
     }

});

$(function(){
   $('#id_descript14').change(function(){
        setTimeout(function(){
                var selectBox =document.getElementById('id_descript14');
                var userInput =selectBox.options[selectBox.selectedIndex].value;
                console.log(userInput);
                var url = $(".form2").attr("descript14-url");
                    $.ajax({
                        type:'POST',
                       url: url,
                       data:{
                            id_descript14: $('#id_descript14').val(),
                            csrfmiddlewaretoken: '{{ csrf_token }}'
                         },
                    });
        }, 100);
    });
});
