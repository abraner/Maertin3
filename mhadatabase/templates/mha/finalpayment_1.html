<div class="input">
    <input id="finalpayment_id" type="text" value="{{ finalpayment }}">

</div>
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script>
   $(document).ready(function() {

     var x = document.getElementById('finalpayment_id').value;
    if (x.indexOf("$") != 0)
    {
        x = "$" + x.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }
    document.getElementById('finalpayment_id').value = x;
    console.log(x);
});



</script>
