<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" type="image/png" href="../../../img/img.png"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../../static/login/laborrates.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <title>Maertin Heating & Cooling Bidding Program</title>
</head>
<body style="background-image: url('../../../../img/A.jpg');
             background-repeat: no-repeat;
             background-attachment: fixed;
             background-size: cover;" >


    <div class="container2">

            <div class="container2A">

                <div id='package1'>
                    <div class="butclose">
                        <span class="close-btn" onclick="closeFormAndRedirect()">&times;</span>
                    </div>
                    <div class="container2a">
                        <div class="header3">
                            <div class="D">ID</div>
                            <div class="A">Tech Level</div>
                            <div class="B">Rate</div>

                        </div>
                        <form class="form2" method="post">
                            {% for obj in object_list %}
                            <div class="rowmat">
                                <a class="id" >{{ obj.id }}</a>
                                <div class="descrip">{{ obj.level }}</div>
                                <div class="cost">{{ obj.rate }}</div>
                                <a class="changerate" href="{{ obj.get_absolute_url }}">Change Rate / Delete</a>
                            </div>
                            {% endfor %}
                        </form>
                        <div id="butrow">
                            <a href="{% url 'mhadatabase:addnewtechlevel' %}">
                                <button type="button" class="button1">Add New Tech Level</button>
                            </a>
                         </div>
                    </div>

                </div>

            </div>

        </div>
</body>
</html>
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script>


        // Check if the page has already been reloaded in this session
        if (!sessionStorage.getItem('aborrates')) {
            // Set the flag so it doesn't loop infinitely
            sessionStorage.setItem('aborrates', 'true');
            // Force the page reload
            window.location.reload();
        } else {
            // Clean up the item if they navigate away or close the tab later
            sessionStorage.removeItem('aborrates');
        }




let allElements = document.querySelectorAll('.packagecost, .cost');
allElements.forEach(element => {
if (element.textContent.indexOf("$") != 0)
{
    element.textContent = "$" + element.textContent.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
}
console.log(element.textContent);
});

function closeFormAndRedirect() {
    window.location.href = '{% url 'mhadatabase:mainsettingpage' %}'; // Redirect
}


</script>
