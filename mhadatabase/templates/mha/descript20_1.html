<script>
$(document).ready(function() {

  if ($('#id_descript20').val() === 'Select Material' || $('#id_descript20').val() === '' &&  $('#descript20b_id').val() == 1 ){
       $("#id_descript20").css('background-color', '#1E5938')
        $("#id_descript20").attr("disabled", true)
     } else if  ($('#id_descript20').val() === 'Select Material' || $('#id_descript20').val() === '' &&  $('#descript20b_id').val() > 1 ){
        $("#id_descript20").attr("disabled", false)
        $("#id_descript20").css('background-color', '#90B5A1')
     } else   {
        $("#id_descript20").css('background-color', 'gold')
     }

});

$(function(){
   $('#id_descript20').change(function(){
        setTimeout(function(){
                var selectBox =document.getElementById('id_descript20');
                var userInput =selectBox.options[selectBox.selectedIndex].value;
                console.log(userInput);
                var url = $(".form2").attr("descript20-url");
                    $.ajax({
                        type:'POST',
                       url: url,
                       data:{
                            id_descript20: $('#id_descript20').val(),
                            csrfmiddlewaretoken: '{{ csrf_token }}'
                         },
                    });
        }, 100);
    });
});
