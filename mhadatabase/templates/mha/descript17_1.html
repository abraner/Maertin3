<script>
$(document).ready(function() {

  if ($('#id_descript17').val() === 'Select Material' || $('#id_descript17').val() === '' &&  $('#descript17b_id').val() == 1 ){
       $("#id_descript17").css('background-color', '#1E5938')
        $("#id_descript17").attr("disabled", true)
     } else if  ($('#id_descript17').val() === 'Select Material' || $('#id_descript17').val() === '' &&  $('#descript17b_id').val() > 1 ){
        $("#id_descript17").attr("disabled", false)
        $("#id_descript17").css('background-color', '#90B5A1')
     } else   {
        $("#id_descript17").css('background-color', 'gold')
     }

});

$(function(){
   $('#id_descript17').change(function(){
        setTimeout(function(){
                var selectBox =document.getElementById('id_descript17');
                var userInput =selectBox.options[selectBox.selectedIndex].value;
                console.log(userInput);
                var url = $(".form2").attr("descript17-url");
                    $.ajax({
                        type:'POST',
                       url: url,
                       data:{
                            id_descript17: $('#id_descript17').val(),
                            csrfmiddlewaretoken: '{{ csrf_token }}'
                         },
                    });
        }, 100);
    });
});
