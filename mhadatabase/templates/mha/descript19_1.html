<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script>
$(document).ready(function() {

    if ($('#id_descript19').val() === 'Select Material') {
       $("#id_descript19").css('background-color', '#2e8b57')
       $("#id_descript19").attr("disabled", true)
       $("#id_quanity19").attr("disabled", true)
       $(".delete19").attr("disabled", true)
    } else {
        $("#id_descript19").css('background-color', 'gold')
        $(".delete19").attr("disabled", false)
   }

});

$(function(){
   $('#id_descript19').change(function(){
        setTimeout(function(){
                var selectBox =document.getElementById('id_descript19');
                var userInput =selectBox.options[selectBox.selectedIndex].value;
                console.log(userInput);
                var url = $(".form2").attr("descript19-url");
                    $.ajax({
                        type:'POST',
                       url: url,
                       data:{
                            id_descript19: $('#id_descript19').val(),
                            csrfmiddlewaretoken: '{{ csrf_token }}'
                         },
                    });
        }, 100);
    });
});
