<script>
$(document).ready(function() {
  if ($('#id_descript19').val() === 'Select Material' || $('#id_descript19').val() === '' &&  $('#descript19b_id').val() == 1 ){
       $("#id_descript19").css('background-color', '#1E5938')
        $("#id_descript19").attr("disabled", true)
     } else if  ($('#id_descript19').val() === 'Select Material' || $('#id_descript19').val() === '' &&  $('#descript19b_id').val() > 1 ){
        $("#id_descript19").attr("disabled", false)
        $("#id_descript19").css('background-color', '#90B5A1')
     } else   {
        $("#id_descript19").css('background-color', 'gold')
     }

});

$(function(){
   $('#id_descript19').change(function(){
        setTimeout(function(){
                var selectBox =document.getElementById('id_descript19');
                var userInput =selectBox.options[selectBox.selectedIndex].value;
                console.log(userInput);
                var url = $(".form2").attr("descript19-url");
                    $.ajax({
                        type:'POST',
                       url: url,
                       data:{
                            id_descript19: $('#id_descript19').val(),
                            csrfmiddlewaretoken: '{{ csrf_token }}'
                         },
                    });
        }, 100);
    });
});
