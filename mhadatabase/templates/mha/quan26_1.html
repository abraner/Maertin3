{{ form.quanity26 }}
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script>
    $(function(){
   $('#id_quanity26').change(function(){
        setTimeout(function(){
                var selectBox =document.getElementById('id_quanity26');
                var userInput =selectBox.options[selectBox.selectedIndex].value;
                console.log(userInput);
                var url = $(".form2").attr("quant26-url");
                    $.ajax({
                        type:'POST',
                       url: url,
                       data:{
                            id_quanity26: $('#id_quanity26').val(),
                            csrfmiddlewaretoken: '{{ csrf_token }}'
                         },
                    });
        }, 100);
    });
});
</script>
