<script>
$(document).ready(function() {

  if ($('#id_descript11').val() === 'Select Material' || $('#id_descript11').val() === '' &&  $('#descript11b_id').val() == 1 ){
       $("#id_descript11").css('background-color', '#1E5938')
        $("#id_descript11").attr("disabled", true)
     } else if  ($('#id_descript11').val() === 'Select Material' || $('#id_descript11').val() === '' &&  $('#descript11b_id').val() > 1 ){
        $("#id_descript11").attr("disabled", false)
        $("#id_descript11").css('background-color', '#90B5A1')
     } else   {
        $("#id_descript11").css('background-color', 'gold')
     }

});

$(function(){
   $('#id_descript11').change(function(){
        setTimeout(function(){
                var selectBox =document.getElementById('id_descript11');
                var userInput =selectBox.options[selectBox.selectedIndex].value;
                console.log(userInput);
                var url = $(".form2").attr("descript11-url");
                    $.ajax({
                        type:'POST',
                       url: url,
                       data:{
                            id_descript11: $('#id_descript11').val(),
                            csrfmiddlewaretoken: '{{ csrf_token }}'
                         },
                    });
        }, 100);
    });
});
