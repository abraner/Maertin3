<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script>
$(document).ready(function() {

    if ($('#id_descript1').val() === '') {
       $("#id_descript1").css('background-color', '#2e8b57')
       $(".form2 #id_quanity1").attr("disabled", true)
    } else {
        $("#id_descript1").css('background-color', 'gold')
        $(".form2 #id_quanity1").attr("disabled", false)
    }

    if ($('.form2 #id_jobtype1').val() === 'Select Equip. Type') {
        $("#id_descript1").attr("disabled", true)
    } else {
        $("#id_descript1").attr("disabled", false)
    }



});

$(function(){
   $('#id_descript1').change(function(){
        setTimeout(function(){
                var selectBox =document.getElementById('id_descript1');
                var userInput =selectBox.options[selectBox.selectedIndex].value;
                console.log(userInput);
                var url = $(".form2").attr("descript1-url");
                    $.ajax({
                        type:'POST',
                       url: url,
                       data:{
                            id_descript1: $('#id_descript1').val(),
                            csrfmiddlewaretoken: '{{ csrf_token }}'
                         },
                    });
        }, 100);
    });
});

    $('#id_descript1').change(function(){
        setTimeout(function(){

            req = $.ajax({

                     },

                     }
                });

});
