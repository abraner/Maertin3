{{ form.techhrs3 }}

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script>

$(document).ready(function() {

setTimeout(function(){
    if ($('.form2 #id_techlevel3').val() >0 ){
       $("#id_techhrs3").css('background-color', 'gold')
       $("#id_techhrs3").attr("disabled", false)
       $("#id_techlevel4").css('background-color', 'gold')
       $("#iid_techlevel4").attr("disabled", false)
    } else {
        $("#id_techhrs3").css('background-color', '#2e8b57')
        $("#id_techhrs3").attr("disabled", true)
        $("#id_techlevel4").css('background-color', '#2e8b57')
        $("#id_techlevel4").attr("disabled", true)
    }
}, 100);

});

$(function(){
   $('#id_techhrs3').change(function(){
        setTimeout(function(){
                var selectBox =document.getElementById('id_techhrs3');
                var userInput =selectBox.options[selectBox.selectedIndex].value;
                console.log(userInput);
                var url = $(".form2").attr("techlevelhrs3-url");
                    $.ajax({
                        type:'POST',
                       url: url,
                       data:{
                            id_techhrs3: $('#id_techhrs3').val(),
                            csrfmiddlewaretoken: '{{ csrf_token }}'
                         },
                    });
        }, 100);
    });
});


</script>
