<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script>
$(document).ready(function() {

    if ($('#id_descript21').val() === 'Select Material') {
       $("#id_descript21").css('background-color', '#2e8b57')
       $("#id_descript21").attr("disabled", true)
       $("#id_quanity21").attr("disabled", true)
       $(".delete21").attr("disabled", true)
    } else {
        $("#id_descript21").css('background-color', 'gold')
        $(".delete21").attr("disabled", false)
   }

});

$(function(){
   $('#id_descript21').change(function(){
        setTimeout(function(){
                var selectBox =document.getElementById('id_descript21');
                var userInput =selectBox.options[selectBox.selectedIndex].value;
                console.log(userInput);
                var url = $(".form2").attr("descript21-url");
                    $.ajax({
                        type:'POST',
                       url: url,
                       data:{
                            id_descript21: $('#id_descript21').val(),
                            csrfmiddlewaretoken: '{{ csrf_token }}'
                         },
                    });
        }, 100);
    });
});
