<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" type="image/png" href="../../../img/img.png"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../../../static/login/changetechrate.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <title>Maertin Heating & Cooling Bidding Program</title>
</head>
<body style="background-image: url('../../../../img/A.jpg');
             background-repeat: no-repeat;
             background-attachment: fixed;
             background-size: cover;" >

<div class="container1">
        <div class="header">Change Tech. Labor Rate</div>
    <div class="container1add">
        <div class="butclose">
            <span class="closeadd-btn" onclick="closeFormAndRedirect()">&times;</span>
        </div>
        <form class="form2" method="post"
            changetechrate-url="{% url 'mhadatabase:changetechrate' instance.id %}"
            changelaborrate-url="{% url 'mhadatabase:changelaborrate' instance.id %}"
            addnewtechlevel-url="{% url 'mhadatabase:addnewtechlevel' %}"
        >
          <div class="techinfo">
                  {% for obj in object_list %}
                  <div class="form-row-id">
                    <label class="label">ID</label>
                      <div class="id">
                        {{ obj.idA }}
                      </div>
                </div>
                <div class="form-row-techlevel">
                    <label class="label">Tech. Level</label>
                    <div class="level">
                        {{ obj.level }}
                    </div>
                </div>  
          </div>
          <div class="techinfo1">
                <div class="form-row-rate">
                    <label class="label">Current Tech. Rate</label>
                        <div class="rate"  onfocusout="changeRate()">
                            {{ form.rate }}
                        </div>
                </div>
                  {% endfor %}
              <div class="buttonrow">
                  <a id="accept"  href="/mhadatabase/laborrates">Accept</a>
              <a href="{% url 'mhadatabase:deletetech' instance.id %}">
                  <button type="button" class="delete">Delete</button>
              </a>
              </div>
          </div>
        </form>
    </div>
</div>
</body>
</html>
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>

<script>

function changeRate() {
var userInput = document.getElementById("id_rate").value;
                    $("#id_mfg").attr("disabled", false)
                    $('#id_mfg').focus();
                    console.log(userInput);
                    var url = $(".form2").attr("changelaborrate-url");
                     $.ajax({
                        type:'POST',
                       url: url,
                       data:{
                            id_rate: $("#id_rate").val(),
                            csrfmiddlewaretoken: '{{ csrf_token }}'
                         },
                    });

window.location.href = '{% url 'mhadatabase:laborrates' %}'; // Redirect

}

$(function(){
   $('#id_level').change(function(){
        setTimeout(function(){
                var selectBox =document.getElementById('id_level');
                var userInput =selectBox.options[selectBox.selectedIndex].value;
                console.log(userInput);
                var url = $(".form2").attr("addnewtechlevel-url");
                    $.ajax({
                        type:'POST',
                       url: url,
                       data:{
                            id_level: $('#id_level').val(),
                            csrfmiddlewaretoken: '{{ csrf_token }}'
                         },
                    });

        }, 0);
    });
});

$(function(){
   $('#id_quant').change(function(){
       $("#butrowA").show()
        setTimeout(function(){
                var selectBox =document.getElementById('id_quant');
                var userInput =selectBox.options[selectBox.selectedIndex].value;
                console.log(userInput);
                var url = $(".form2").attr("package1b-url");
                    $.ajax({
                        type:'POST',
                       url: url,
                       data:{
                            id_quant: $('#id_quant').val(),
                            csrfmiddlewaretoken: '{{ csrf_token }}'
                         },
                    });
        }, 300);
    });
});

function closeFormAndRedirect() {
    window.location.href = '{% url 'mhadatabase:laborrates' %}'; // Redirect
}


</script>
