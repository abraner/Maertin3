{{ form.techhrs2 }}

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script>
$(document).ready(function() {

setTimeout(function(){
    if ($('.form2 #id_techlevel2').val() >0 ){
       $("#id_techhrs2").css('background-color', 'gold')
       $("#id_techhrs2").attr("disabled", false)
       $("#id_techlevel3").css('background-color', 'gold')
       $("#iid_techlevel3").attr("disabled", false)
    } else {
        $("#id_techhrs2").css('background-color', '#2e8b57')
        $("#id_techhrs2").attr("disabled", true)
        $("#id_techlevel3").css('background-color', '#2e8b57')
        $("#id_techlevel3").attr("disabled", true)
    }
}, 100);

});

$(function(){
   $('#id_techhrs2').change(function(){
        setTimeout(function(){
                var selectBox =document.getElementById('id_techhrs2');
                var userInput =selectBox.options[selectBox.selectedIndex].value;
                console.log(userInput);
                var url = $(".form2").attr("techlevelhrs2-url");
                    $.ajax({
                        type:'POST',
                       url: url,
                       data:{
                            id_techhrs2: $('#id_techhrs2').val(),
                            csrfmiddlewaretoken: '{{ csrf_token }}'
                         },
                    });
        }, 100);
    });
});


</script>
