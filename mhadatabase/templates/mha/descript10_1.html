<script>
$(document).ready(function() {

  if ($('#id_descript10').val() === 'Select Material' || $('#id_descript10').val() === '' &&  $('#descript10b_id').val() == 1 ){
       $("#id_descript10").css('background-color', '#1E5938')
        $("#id_descript10").attr("disabled", true)
     } else if  ($('#id_descript10').val() === 'Select Material' || $('#id_descript10').val() === '' &&  $('#descript10b_id').val() > 1 ){
        $("#id_descript10").attr("disabled", false)
        $("#id_descript10").css('background-color', '#90B5A1')
     } else   {
        $("#id_descript10").css('background-color', 'gold')
     }
});


$(function(){
   $('#id_descript10').change(function(){
        setTimeout(function(){
                var selectBox =document.getElementById('id_descript10');
                var userInput =selectBox.options[selectBox.selectedIndex].value;
                console.log(userInput);
                var url = $(".form2").attr("descript10-url");
                    $.ajax({
                        type:'POST',
                       url: url,
                       data:{
                            id_descript10: $('#id_descript10').val(),
                            csrfmiddlewaretoken: '{{ csrf_token }}'
                         },
                    });
        }, 100);
    });
});
