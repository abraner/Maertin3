<script>
$(document).ready(function() {

    if ($('#id_descript10').val() === 'Select Material') {
       $("#id_descript10").css('background-color', '#2e8b57')
       $("#id_descript10").attr("disabled", true)
       $("#id_quanity10").attr("disabled", true)

    } else {
        $("#id_descript10").css('background-color', 'gold')
        $(".delete10").attr("disabled", false)
   }

});

                console.log(userInput);
                var url = $(".form2").attr("descript10-url");
                    $.ajax({

                            csrfmiddlewaretoken: '{{ csrf_token }}'

                    });
        }, 100);
    });
});
