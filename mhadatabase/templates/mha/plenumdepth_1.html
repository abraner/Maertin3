
<div class="input">
<label class="label_plenumdepth">Depth :</label>
    <input id="plenumdepth_id" type="text" value="{{ plenumdepth }}" onfocusout="myFunctionPlenumDepth()">

</div>
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script>
 $(document).ready(function() {
  $("#plenumdepth_id").attr("disabled", true)
   const inputFields = document.querySelectorAll('input[type="text"], input[type="email"], input[type="number"]');

   inputFields.forEach(input => {
     const defaultValue = input.value;
     input.addEventListener('focus', function() {
       if (this.value === defaultValue) {
         this.value = '';
       }
     });
     input.addEventListener('blur', function() {
        if (this.value === '') {
         this.value = defaultValue;
        }
     });
   });
});


function myFunctionPlenumDepth() {
        if ($('#plenumdepth_id').val() >1) $("#width_id").attr("disabled", false)
        $("#plenumdepth_id").css('background-color', '#ffd700')
        $("#id_existfurnconfig").attr("disabled", false).css('background-color', '#66d09a')
        $('#id_existfurnconfig').focus();

var userInput = document.getElementById("plenumdepth_id").value;
                    console.log(userInput);
                    var url = $(".form2").attr("plenumdepth-url");
                     $.ajax({
                        type:'POST',
                       url: url,
                       data:{
                            plenumdepth_id: $("#plenumdepth_id").val(),
                            csrfmiddlewaretoken: '{{ csrf_token }}'
                         },
                    });
}


</script>
