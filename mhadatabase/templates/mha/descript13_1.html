<script>
$(document).ready(function() {

  if ($('#id_descript13').val() === 'Select Material' || $('#id_descript13').val() === '' &&  $('#descript13b_id').val() == 1 ){
       $("#id_descript13").css('background-color', '#1E5938')
        $("#id_descript13").attr("disabled", true)
     } else if  ($('#id_descript13').val() === 'Select Material' || $('#id_descript13').val() === '' &&  $('#descript13b_id').val() > 1 ){
        $("#id_descript13").attr("disabled", false)
        $("#id_descript13").css('background-color', '#90B5A1')
     } else   {
        $("#id_descript13").css('background-color', 'gold')
     }

});

$(function(){
   $('#id_descript13').change(function(){
        setTimeout(function(){
                var selectBox =document.getElementById('id_descript13');
                var userInput =selectBox.options[selectBox.selectedIndex].value;
                console.log(userInput);
                var url = $(".form2").attr("descript13-url");
                    $.ajax({
                        type:'POST',
                       url: url,
                       data:{
                            id_descript13: $('#id_descript13').val(),
                            csrfmiddlewaretoken: '{{ csrf_token }}'
                         },
                    });
        }, 100);
    });
});
