<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script>

$(document).ready(function() {

    if ($('#id_descript12').val() === 'Select Material') {
       $("#id_descript12").css('background-color', '#2e8b57')
       $("#id_quanity12").attr("disabled", true)
    } else {
        $("#id_descript12").css('background-color', 'gold')
       // $("#id_descript12").attr("disabled", true)
   }

});

    $(function(){
   $('#id_quanity12').change(function(){
        setTimeout(function(){
                var selectBox =document.getElementById('id_quanity12');
                var userInput =selectBox.options[selectBox.selectedIndex].value;
                console.log(userInput);
                var url = $(".form2").attr("quant12-url");
                    $.ajax({
                        type:'POST',
                       url: url,
                       data:{
                            id_quanity12: $('#id_quanity12').val(),
                            csrfmiddlewaretoken: '{{ csrf_token }}'
                         },
                    });
        }, 100);
    });
});
</script>
