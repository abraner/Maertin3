<script>
$(document).ready(function() {

  if ($('#id_descript16').val() === 'Select Material' || $('#id_descript16').val() === '' &&  $('#descript16b_id').val() == 1 ){
       $("#id_descript16").css('background-color', '#1E5938')
        $("#id_descript16").attr("disabled", true)
     } else if  ($('#id_descript16').val() === 'Select Material' || $('#id_descript16').val() === '' &&  $('#descript16b_id').val() > 1 ){
        $("#id_descript16").attr("disabled", false)
        $("#id_descript16").css('background-color', '#90B5A1')
     } else   {
        $("#id_descript16").css('background-color', 'gold')
     }

});

$(function(){
   $('#id_descript16').change(function(){
        setTimeout(function(){
                var selectBox =document.getElementById('id_descript16');
                var userInput =selectBox.options[selectBox.selectedIndex].value;
                console.log(userInput);
                var url = $(".form2").attr("descript16-url");
                    $.ajax({
                        type:'POST',
                       url: url,
                       data:{
                            id_descript16: $('#id_descript16').val(),
                            csrfmiddlewaretoken: '{{ csrf_token }}'
                         },
                    });
        }, 100);
    });
});
