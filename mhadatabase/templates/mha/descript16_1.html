<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script>
$(document).ready(function() {

    if ($('#id_descript16').val() === 'Select Material') {
       $("#id_descript16").css('background-color', '#2e8b57')
       $("#id_descript16").attr("disabled", true)
       $("#id_quanity16").attr("disabled", true)
       $(".delete16").attr("disabled", true)
    } else {
        $("#id_descript16").css('background-color', 'gold')
        $(".delete16").attr("disabled", false)
   }

});

$(function(){
   $('#id_descript16').change(function(){
        setTimeout(function(){
                var selectBox =document.getElementById('id_descript16');
                var userInput =selectBox.options[selectBox.selectedIndex].value;
                console.log(userInput);
                var url = $(".form2").attr("descript16-url");
                    $.ajax({
                        type:'POST',
                       url: url,
                       data:{
                            id_descript16: $('#id_descript16').val(),
                            csrfmiddlewaretoken: '{{ csrf_token }}'
                         },
                    });
        }, 100);
    });
});
