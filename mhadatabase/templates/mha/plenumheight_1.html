
<div class="input">
<label class="label_plenumheight">Plenum Height :</label>
    <input id="plenumheight_id" type="text" value="{{ plenumheight }}" onfocusout="myFunctionPlenumHeight()">

</div>
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script>
 $(document).ready(function() {
    $("#plenumheight_id").attr("disabled", true)
   const inputFields = document.querySelectorAll('input[type="text"], input[type="email"], input[type="number"]');

   inputFields.forEach(input => {
     const defaultValue = input.value;
     input.addEventListener('focus', function() {
       if (this.value === defaultValue) {
         this.value = '';
       }
     });
     input.addEventListener('blur', function() {
        if (this.value === '') {
         this.value = defaultValue;
        }
     });
   });
});


function myFunctionPlenumHeight() {
$("#id_joblocation").attr("disabled", true).css('background-color', '#66d09a')
if ($('#plenumheight_id').val() >1) $("#id_plenumwidth").attr("disabled", false)
$("#plenumheight_id").css('background-color', '#ffd700')
$("#id_plenumwidth").attr("disabled", false).css('background-color', '#66d09a')
$('#id_plenumwidth').focus();



var userInput = document.getElementById("plenumheight_id").value;
                    console.log(userInput);
                    var url = $(".form2").attr("plenumheight-url");
                     $.ajax({
                        type:'POST',
                       url: url,
                       data:{
                            plenumheight_id: $("#plenumheight_id").val(),
                            csrfmiddlewaretoken: '{{ csrf_token }}'
                         },
                    });
}


</script>
