<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script>
$(document).ready(function() {

    if ($('#id_descript12').val() === 'Select Material') {
       $("#id_descript12").css('background-color', '#2e8b57')
       $("#id_descript12").attr("disabled", true)
       $("#id_quanity12").attr("disabled", true)
       $(".delete12").attr("disabled", true)
    } else {
        $("#id_descript12").css('background-color', 'gold')
        $(".delete12").attr("disabled", false)
   }

});

$(function(){
   $('#id_descript12').change(function(){
        setTimeout(function(){
                var selectBox =document.getElementById('id_descript12');
                var userInput =selectBox.options[selectBox.selectedIndex].value;
                console.log(userInput);
                var url = $(".form2").attr("descript12-url");
                    $.ajax({
                        type:'POST',
                       url: url,
                       data:{
                            id_descript12: $('#id_descript12').val(),
                            csrfmiddlewaretoken: '{{ csrf_token }}'
                         },
                    });
        }, 100);
    });
});
