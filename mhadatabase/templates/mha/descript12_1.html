<script>
$(document).ready(function() {

  if ($('#id_descript12').val() === 'Select Material' || $('#id_descript12').val() === '' &&  $('#descript12b_id').val() == 1 ){
       $("#id_descript12").css('background-color', '#1E5938')
        $("#id_descript12").attr("disabled", true)
     } else if  ($('#id_descript12').val() === 'Select Material' || $('#id_descript12').val() === '' &&  $('#descript12b_id').val() > 1 ){
        $("#id_descript12").attr("disabled", false)
        $("#id_descript12").css('background-color', '#90B5A1')
     } else   {
        $("#id_descript12").css('background-color', 'gold')
     }

});

$(function(){
   $('#id_descript12').change(function(){
        setTimeout(function(){
                var selectBox =document.getElementById('id_descript12');
                var userInput =selectBox.options[selectBox.selectedIndex].value;
                console.log(userInput);
                var url = $(".form2").attr("descript12-url");
                    $.ajax({
                        type:'POST',
                       url: url,
                       data:{
                            id_descript12: $('#id_descript12').val(),
                            csrfmiddlewaretoken: '{{ csrf_token }}'
                         },
                    });
        }, 100);
    });
});
